# SonarQube Frontend Configuration
sonar.projectKey=susorewards-frontend
sonar.projectName=SusoRewards Frontend
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Source and Test directories relative to frontend root
sonar.sources=src
sonar.tests=src

# Inclusions and Exclusions
sonar.exclusions=**/node_modules/**,**/.svelte-kit/**,**/dist/**,**/*.spec.ts,**/*.test.ts
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# Coverage Reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
